<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ecopark LK Admin{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1d2430;
      --muted: #667085;
      --border: #d8dee8;
      --accent: #176b5b;
      --accent-dark: #0f4e43;
      --error: #b42318;
      --success: #087443;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    nav {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 7px 9px;
      border-radius: 6px;
      font-weight: 600;
    }

    nav a:hover,
    nav a.active {
      background: #edf4f2;
      color: var(--accent-dark);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 650;
    }

    main { padding: 24px 0 40px; }

    .button {
      appearance: none;
      border: 0;
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 650;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
    }

    .button:hover { background: var(--accent-dark); }

    .button.secondary {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .button.secondary:hover {
      background: #edf4f2;
      color: var(--accent-dark);
    }

    .input {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      min-width: min(320px, 100%);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .message {
      border: 1px solid var(--border);
      border-left-width: 4px;
      background: var(--panel);
      padding: 10px 12px;
      border-radius: 6px;
    }

    .message.success { border-left-color: var(--success); }
    .message.error { border-left-color: var(--error); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric,
    .section {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
    }

    .metric {
      padding: 14px;
      min-width: 0;
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric .value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .grid-even {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .section { overflow: hidden; }

    .section-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #fbfcfd;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
    }

    tr:last-child td { border-bottom: 0; }

    .num {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1849a9;
      font-weight: 650;
      font-size: 12px;
    }

    .status.ok {
      background: #edfcf2;
      color: var(--success);
    }

    .status.error {
      background: #fef3f2;
      color: var(--error);
    }

    .muted { color: var(--muted); }

    @media (max-width: 900px) {
      .metrics,
      .grid { grid-template-columns: 1fr; }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div class="brand">
        <h1>Ecopark LK Admin</h1>
        <nav aria-label="Разделы">
          <a href="{{ url_for('admin') }}" class="{% if request.endpoint == 'admin' %}active{% endif %}">Обзор</a>
          <a href="{{ url_for('debts') }}" class="{% if request.endpoint in ['debts', 'plot_detail'] %}active{% endif %}">Участки</a>
          <a href="{{ url_for('debtors') }}" class="{% if request.endpoint == 'debtors' %}active{% endif %}">Должники</a>
        </nav>
      </div>
      {% block actions %}{% endblock %}
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
